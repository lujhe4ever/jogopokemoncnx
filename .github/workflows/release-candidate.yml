name: Build release candidate (no deploy)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17.5-alpine
        env:
          POSTGRES_DB: projeto_lt
          POSTGRES_PASSWORD: projeto_lt
          POSTGRES_USER: projeto_lt
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U projeto_lt"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://projeto_lt:projeto_lt@localhost:5432/projeto_lt
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @lt/server prisma:generate
      - run: pnpm --filter @lt/server db:migrate
      - run: pnpm check
      - run: pnpm audit --prod --audit-level critical
      - run: bash ops/scripts/verify-backup.sh

  images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build server image without publishing
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ops/docker/server.Dockerfile
          push: false
      - name: Build web image without publishing
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ops/docker/web.Dockerfile
          push: false
      - name: Build admin image without publishing
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ops/docker/admin.Dockerfile
          push: false
