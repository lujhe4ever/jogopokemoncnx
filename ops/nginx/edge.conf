map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

upstream lt_server {
  server server:3000;
}
upstream lt_web {
  server web:8080;
}
upstream lt_admin {
  server admin:8080;
}

server {
  listen 8080;
  server_name _;
  return 301 https://$host$request_uri;
}

server {
  listen 8443 ssl;
  server_name game.example.invalid;
  ssl_certificate /run/secrets/tls_cert;
  ssl_certificate_key /run/secrets/tls_key;
  ssl_protocols TLSv1.2 TLSv1.3;
  client_max_body_size 64k;
  add_header Strict-Transport-Security "max-age=31536000" always;

  location ~ ^/(auth|api|health|ready) {
    proxy_pass http://lt_server;
    proxy_set_header Host $host;
    proxy_set_header X-Request-Id $request_id;
    proxy_set_header X-Forwarded-Proto https;
  }
  location ~ ^/(ws|arena)$ {
    proxy_pass http://lt_server;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
  }
  location / {
    proxy_pass http://lt_web;
  }
}

server {
  listen 8443 ssl;
  server_name admin.example.invalid;
  ssl_certificate /run/secrets/tls_cert;
  ssl_certificate_key /run/secrets/tls_key;
  ssl_protocols TLSv1.2 TLSv1.3;
  client_max_body_size 64k;
  add_header Strict-Transport-Security "max-age=31536000" always;

  location ~ ^/(auth|api|health|ready) {
    proxy_pass http://lt_server;
    proxy_set_header Host $host;
    proxy_set_header X-Request-Id $request_id;
    proxy_set_header X-Forwarded-Proto https;
  }
  location / {
    proxy_pass http://lt_admin;
  }
}
