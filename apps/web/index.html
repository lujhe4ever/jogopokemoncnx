<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#16231c" />
    <title>Projeto LT — Casa</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main>
      <section id="auth-panel">
        <p class="eyebrow">PROJETO LT</p>
        <h1>Entre na sua casa</h1>
        <p>Protótipo original de movimento e colisão.</p>
        <form id="auth-form">
          <label
            >Nome público
            <input
              name="displayName"
              minlength="2"
              maxlength="40"
              value="Explorador"
          /></label>
          <label
            >E-mail
            <input
              name="email"
              type="email"
              required
              value="player@example.com"
          /></label>
          <label
            >Senha
            <input
              name="password"
              type="password"
              minlength="12"
              required
              value="local-password"
          /></label>
          <div class="actions">
            <button type="button" id="register">Criar conta</button>
            <button type="submit">Entrar</button>
          </div>
        </form>
        <p id="status" role="status"></p>
      </section>
      <section id="game-panel" hidden>
        <header>
          <strong>Casa do Explorador</strong
          ><span id="connection">conectando...</span>
        </header>
        <div id="game"></div>
        <p id="interaction-feedback" role="status" aria-live="polite">
          Aproxime-se de uma pessoa ou objeto e use E ou Interagir.
        </p>
        <button type="button" id="start-battle">Batalhar com treinador</button>
        <button type="button" id="quest-journal-button">
          Diário de missões
        </button>
        <div id="touch-pad" aria-label="Controles de movimento">
          <button data-direction="up">▲</button>
          <div>
            <button data-direction="left">◀</button
            ><button data-direction="down">▼</button
            ><button data-direction="right">▶</button>
          </div>
          <button type="button" id="interact">Interagir</button>
        </div>
      </section>
      <section
        id="quest-panel"
        hidden
        aria-labelledby="quest-journal-title"
        aria-busy="false"
      >
        <div class="panel-heading">
          <div>
            <p class="eyebrow">JORNADA</p>
            <h2 id="quest-journal-title">Diário de missões</h2>
          </div>
          <button type="button" id="close-quest-journal">
            Voltar ao mundo
          </button>
        </div>
        <p id="quest-status" role="status" aria-live="polite"></p>
        <div id="quest-list"></div>
      </section>
      <section id="battle-panel" hidden aria-labelledby="battle-title">
        <h2 id="battle-title">Batalha de treinamento</h2>
        <p id="battle-status" role="status" aria-live="assertive"></p>
        <div class="battle-combatants">
          <div>
            <strong id="battle-player-name">Jogador</strong>
            <progress id="battle-player-health" max="1" value="1"></progress>
          </div>
          <div>
            <strong id="battle-npc-name">Adversário</strong>
            <progress id="battle-npc-health" max="1" value="1"></progress>
          </div>
        </div>
        <div class="battle-actions" aria-label="Ações de batalha">
          <button type="button" data-battle-action="strike">Atacar</button>
          <button type="button" data-battle-action="guard">Defender</button>
          <button type="button" id="abandon-battle">Abandonar</button>
          <button type="button" id="capture-creature" hidden>
            Usar Orbe de captura
          </button>
          <button type="button" id="return-world" hidden>
            Retornar ao mundo
          </button>
        </div>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
